name: "Git Repository Mirror"
version: "0.2.0"
slug: "git_mirror"
description: "Mirror Git repositories between GitHub, GitLab, Gitea, Forgejo, and other Git hosts."
url: "https://github.com/tomtomdk/ha-addons/tree/main/git-mirror"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
boot: auto
init: false
homeassistant_api: true
options:
  sync_interval: 3600
  run_on_start: true
  mirror_mode: "heads-tags"
  source_provider: "github"
  source_username: ""
  source_token: ""
  target_provider: "gitlab"
  target_username: ""
  target_token: ""
  github_username: ""
  github_token: ""
  gitlab_username: "oauth2"
  gitlab_token: ""
  gitea_username: ""
  gitea_token: ""
  forgejo_username: ""
  forgejo_token: ""
  notify_on_success: false
  notify_on_failure: true
  ha_notifications: true
  ntfy_enabled: false
  ntfy_url: "https://ntfy.sh"
  ntfy_topic: ""
  ntfy_token: ""
  gotify_enabled: false
  gotify_url: ""
  gotify_token: ""
  discord_enabled: false
  discord_webhook_url: ""
  repos: []
schema:
  sync_interval: "int(60,)"
  run_on_start: "bool"
  mirror_mode: "list(heads-tags|heads-tags-prune|mirror)"
  source_provider: "list(github|gitlab|gitea|forgejo|custom)"
  source_username: "str?"
  source_token: "password?"
  target_provider: "list(github|gitlab|gitea|forgejo|custom)"
  target_username: "str?"
  target_token: "password?"
  github_username: "str?"
  github_token: "password?"
  gitlab_username: "str"
  gitlab_token: "password?"
  gitea_username: "str?"
  gitea_token: "password?"
  forgejo_username: "str?"
  forgejo_token: "password?"
  notify_on_success: "bool"
  notify_on_failure: "bool"
  ha_notifications: "bool"
  ntfy_enabled: "bool"
  ntfy_url: "str?"
  ntfy_topic: "str?"
  ntfy_token: "password?"
  gotify_enabled: "bool"
  gotify_url: "str?"
  gotify_token: "password?"
  discord_enabled: "bool"
  discord_webhook_url: "password?"
  repos:
    - name: "str"
      source: "str"
      target: "str"
      enabled: "bool?"
      source_provider: "list(github|gitlab|gitea|forgejo|custom)?"
      source_username: "str?"
      source_token: "password?"
      target_provider: "list(github|gitlab|gitea|forgejo|custom)?"
      target_username: "str?"
      target_token: "password?"
      mirror_mode: "list(heads-tags|heads-tags-prune|mirror)?"
